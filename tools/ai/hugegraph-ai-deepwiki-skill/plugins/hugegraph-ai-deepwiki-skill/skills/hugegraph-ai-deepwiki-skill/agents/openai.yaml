interface:
  display_name: "HugeGraph AI Repository Assistant"
  short_description: "Answers Apache HugeGraph AI repository questions"
  default_prompt: "Use $hugegraph-ai-deepwiki-skill to answer my Apache HugeGraph AI repository question."

dependencies:
  tools:
    - type: "mcp"
      value: "deepwiki"
      description: "Official DeepWiki MCP server used as the repository knowledge retrieval channel"
      transport: "streamable_http"
      url: "https://mcp.deepwiki.com/mcp"

policy:
  allow_implicit_invocation: true
