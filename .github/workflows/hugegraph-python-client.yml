name: HG-Python-Client CI

on:
  push:
    branches:
      - 'main'
      - 'release-*'
  pull_request:

permissions:
  contents: read

jobs:
  client-unit-contract:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.9.22"

      - name: Cache dependencies
        id: cache-deps
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-${{ matrix.python-version }}-

      - name: Install dependencies with uv sync
        run: |
          uv sync --extra python-client --extra dev

      - name: Run unit and contract tests
        run: |
          uv run pytest hugegraph-python-client/src/tests -m "unit or contract" --cov=pyhugegraph --cov-fail-under=45 --cov-report=term --cov-report=xml:.workflow/quality-program/coverage/client-unit-contract.xml -q

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: client-unit-contract-coverage-${{ matrix.python-version }}
          path: .workflow/quality-program/coverage/client-unit-contract.xml
          if-no-files-found: error

  client-hugegraph-integration:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    services:
      hugegraph:
        image: hugegraph/hugegraph:1.7.0
        env:
          PASSWORD: admin
        options: --health-cmd="curl -f http://localhost:8080/versions || exit 1" --health-interval=10s --health-timeout=5s --health-retries=8
        ports:
          - 8080:8080

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.9.22"

      - name: Cache dependencies
        id: cache-deps
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-${{ matrix.python-version }}-

      - name: Install dependencies with uv sync
        run: |
          uv sync --extra python-client --extra dev

      - name: Run HugeGraph integration tests
        env:
          HUGEGRAPH_REQUIRED: true
          HUGEGRAPH_URL: http://127.0.0.1:8080
          HUGEGRAPH_GRAPH: hugegraph
          HUGEGRAPH_USER: admin
          HUGEGRAPH_PASSWORD: admin
        run: |
          uv run pytest hugegraph-python-client/src/tests -m "integration and hugegraph" -v --tb=short
